name: Daily AI Tools Automation

on:
  schedule:
    # 매일 한국 시간 새벽 4시 (UTC 19:00) 에 자동 실행
    - cron: '0 19 * * *'
  workflow_dispatch: # 웹에서 버튼 클릭으로도 수동 실행 가능 옵션 (테스트용)

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 크롤러와 번역기 라이브러리가 필요하다면 pip (예: requests, bs4 등)
      # 실제 프로덕션일 경우 requests 등이 필요
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests deep-translator duckduckgo-search openai

      # 1. 크롤러 동작으로 JSONL 데이터를 다운받고 번역해 추가
      - name: Run Scraper Bot
        run: python crawler/scraper.py

      # 1.5 유저가 실패한 검색어를 KV에서 읽어와 스스로 웹검색 후 추가하는 자동 요원 가동
      - name: Run AI Auto-Resolver
        env:
          KV_API_SECRET: ${{ secrets.KV_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python crawler/auto_resolver.py

      # 1.6 Futurepedia에서 고품질 AI 도구를 카테고리별로 크롤링 (매일 3개 카테고리씩 순환)
      - name: Run Futurepedia Scraper
        run: python crawler/futurepedia_scraper.py

      # 1.65 TAAFT (theresanaiforthat.com) 에서 대량 크롤링 (매일 10개 카테고리, 최대 150개)
      - name: Run TAAFT Scraper
        run: python crawler/taaft_scraper.py

      # 1.7 "기타" 카테고리를 키워드 기반으로 적절한 카테고리로 자동 재분류
      - name: Run Category Reclassifier
        run: python scripts/reclassify.py

      # 2. 중복된 데이터 및 이름들을 제거하고 내림차순 정렬 (Janitor Bot)
      - name: Run Clean DB Script
        run: python scripts/clean_db.py

      # 2.5 location 필드 자동 분류 (국내/해외)
      - name: Auto-classify Location
        run: python scripts/add_location.py

      - name: Check for DB Changes
        id: db-status
        run: |
          if [[ -n $(git status -s public/data/tools.jsonl data/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord Notification
        if: steps.db-status.outputs.changes == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/notify_discord.py

      - name: Commit and Push Changes
        if: steps.db-status.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/tools.jsonl data/
          git commit -m "auto: AI 툴 DB 데일리 자동 스크랩 및 업데이트 봇 🤖"
          git pull --rebase origin main
          git push
