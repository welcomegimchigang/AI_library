name: Monthly AI Tools Validator

on:
  schedule:
    # 매월 2일 한국 시간 새벽 4시 (UTC 19:00 of the 1st day, or we can just use 19:00 on the 1st to trigger on the 2nd KST)
    # 0 19 1 * * -> UTC 기준 1일 19시 = KST 기준 2일 04시
    - cron: '0 19 1 * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  run-monthly-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Monthly Check Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/monthly_check.py

      - name: Check for DB Changes
        id: db-status
        run: |
          if [[ -n $(git status -s public/data/tools.jsonl) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.db-status.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/tools.jsonl
          git commit -m "auto: AI 툴 DB 월간 정기 점검 🧹 (사망 링크 삭제 완료)"
          git pull --rebase origin main
          git push
